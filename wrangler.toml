# Cloudflare Workers + Static Assets configuration for Brandloop.
# Deploy with: npx wrangler deploy  (Cloudflare's Git integration runs this automatically)

# Worker 名与 Cloudflare 项目一致（线上为 searchfurture.<subdomain>.workers.dev）。
# 想用 brandloop 作为正式地址时，在 dashboard 重命名项目或绑定自定义域名即可。
name = "searchfurture"
main = "worker.js"
compatibility_date = "2026-06-28"

# Static site lives in ./public; served via the ASSETS binding.
[assets]
directory = "./public"
binding = "ASSETS"

# Persist waitlist signups to KV (version-controlled so deploys never drop the binding).
[[kv_namespaces]]
binding = "LEADS"
id = "acfc7962f6ac4a12a0f45c07731d7bf8"

# Realtime signup notifications: set LEAD_WEBHOOK_URL as a Variable in the
# dashboard (Feishu / WeCom / Slack bot webhook). Do not commit secrets here.
# Admin view auth: set ADMIN_TOKEN as an encrypted Secret in the dashboard
# (encrypted secrets survive deploys; plaintext vars can be overwritten).
